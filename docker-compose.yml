

services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    

  user-service:
    build: ./user-service
    env_file:
      - .env
    depends_on:
      - postgres

  order-service:
    build: ./order-service
    env_file:
      - .env
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - user-service
      - order-service