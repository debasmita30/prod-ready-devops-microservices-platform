services:
  postgres:
  image: postgres:15
  env_file:
    - .env
  restart: always
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
    interval: 5s
    timeout: 5s
    retries: 5

  user-service:
    build: ./user-service
    env_file:
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build: ./order-service
    env_file:
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      user-service:
        condition: service_started
      order-service:
        condition: service_started